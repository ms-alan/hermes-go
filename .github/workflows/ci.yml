name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Test
        run: go test -v -race ./...

      - name: Build (verify compilation after tests)
        run: go build ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/hermes-linux-amd64 ./cmd/hermes
          GOOS=linux GOARCH=arm64 go build -o dist/hermes-linux-arm64 ./cmd/hermes
          GOOS=darwin GOARCH=amd64 go build -o dist/hermes-darwin-amd64 ./cmd/hermes
          GOOS=darwin GOARCH=arm64 go build -o dist/hermes-darwin-arm64 ./cmd/hermes
          GOOS=linux GOARCH=amd64 go build -o dist/hermes-gateway-linux-amd64 ./cmd/gateway
          GOOS=linux GOARCH=arm64 go build -o dist/hermes-gateway-linux-arm64 ./cmd/gateway
          GOOS=darwin GOARCH=amd64 go build -o dist/hermes-gateway-darwin-amd64 ./cmd/gateway
          GOOS=darwin GOARCH=arm64 go build -o dist/hermes-gateway-darwin-arm64 ./cmd/gateway

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
