  #   signing_secret: ""

# ── Secrets ───────────────────────────────────────────────────────────────────
# Use ${SECRET:env:VAR_NAME} to reference environment variables.
# Use ${SECRET:path/to/.env} to load from a .env file.
# Examples:
#   api_key: ${SECRET:env:OPENAI_API_KEY}
#   api_key: ${SECRET:env:MINIMAX_API_KEY}
